services:

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./data:/data
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - backend
      - frontend

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
