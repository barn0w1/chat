<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>here-chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300..700&display=swap" rel="stylesheet" />
  <style>
    /* ════════════════════════════════════════════════════════════════
       MD3 LIGHT SCHEME — baseline palette (Violet / Purple source)
       ════════════════════════════════════════════════════════════════ */
    :root {
      /* Primary */
      --md-sys-color-primary:                  #6750A4;
      --md-sys-color-on-primary:               #FFFFFF;
      --md-sys-color-primary-container:        #EADDFF;
      --md-sys-color-on-primary-container:     #21005D;

      /* Secondary */
      --md-sys-color-secondary:                #625B71;
      --md-sys-color-on-secondary:             #FFFFFF;
      --md-sys-color-secondary-container:      #E8DEF8;
      --md-sys-color-on-secondary-container:   #1D192B;

      /* Tertiary */
      --md-sys-color-tertiary:                 #7D5260;
      --md-sys-color-on-tertiary:              #FFFFFF;
      --md-sys-color-tertiary-container:       #FFD8E4;
      --md-sys-color-on-tertiary-container:    #31111D;

      /* Error */
      --md-sys-color-error:                    #B3261E;
      --md-sys-color-on-error:                 #FFFFFF;
      --md-sys-color-error-container:          #F9DEDC;
      --md-sys-color-on-error-container:       #410E0B;

      /* Surface */
      --md-sys-color-background:               #FFFBFE;
      --md-sys-color-on-background:            #1C1B1F;
      --md-sys-color-surface:                  #FFFBFE;
      --md-sys-color-on-surface:               #1C1B1F;
      --md-sys-color-surface-variant:          #E7E0EC;
      --md-sys-color-on-surface-variant:       #49454F;
      --md-sys-color-surface-container-lowest: #FFFFFF;
      --md-sys-color-surface-container-low:    #F7F2FA;
      --md-sys-color-surface-container:        #F3EDF7;
      --md-sys-color-surface-container-high:   #ECE6F0;
      --md-sys-color-surface-container-highest:#E6E0E9;

      /* Outline */
      --md-sys-color-outline:                  #79747E;
      --md-sys-color-outline-variant:          #CAC4D0;

      /* Inverse */
      --md-sys-color-inverse-surface:          #313033;
      --md-sys-color-inverse-on-surface:       #F4EFF4;
      --md-sys-color-inverse-primary:          #D0BCFF;

      /* Scrim */
      --md-sys-color-scrim:                    #000000;

      /* ── Tonal elevation surfaces (light) ── */
      --surface-1: color-mix(in srgb, var(--md-sys-color-primary)  5%, var(--md-sys-color-surface));
      --surface-2: color-mix(in srgb, var(--md-sys-color-primary)  8%, var(--md-sys-color-surface));
      --surface-3: color-mix(in srgb, var(--md-sys-color-primary) 11%, var(--md-sys-color-surface));
      --surface-4: color-mix(in srgb, var(--md-sys-color-primary) 12%, var(--md-sys-color-surface));
      --surface-5: color-mix(in srgb, var(--md-sys-color-primary) 14%, var(--md-sys-color-surface));
    }

    /* ── MD3 type scale ── */
    :root {
      --typescale-display-small-size:    36px;
      --typescale-display-small-weight:  400;
      --typescale-display-small-tracking:-0.25px;

      --typescale-headline-medium-size:  28px;
      --typescale-headline-medium-weight:400;
      --typescale-headline-medium-tracking:0px;

      --typescale-headline-small-size:   24px;
      --typescale-headline-small-weight: 400;
      --typescale-headline-small-tracking:0px;

      --typescale-title-large-size:      22px;
      --typescale-title-large-weight:    400;
      --typescale-title-large-tracking:  0px;

      --typescale-title-medium-size:     16px;
      --typescale-title-medium-weight:   500;
      --typescale-title-medium-tracking: 0.15px;

      --typescale-title-small-size:      14px;
      --typescale-title-small-weight:    500;
      --typescale-title-small-tracking:  0.1px;

      --typescale-body-large-size:       16px;
      --typescale-body-large-weight:     400;
      --typescale-body-large-tracking:   0.5px;

      --typescale-body-medium-size:      14px;
      --typescale-body-medium-weight:    400;
      --typescale-body-medium-tracking:  0.25px;

      --typescale-body-small-size:       12px;
      --typescale-body-small-weight:     400;
      --typescale-body-small-tracking:   0.4px;

      --typescale-label-large-size:      14px;
      --typescale-label-large-weight:    500;
      --typescale-label-large-tracking:  0.1px;

      --typescale-label-medium-size:     12px;
      --typescale-label-medium-weight:   500;
      --typescale-label-medium-tracking: 0.5px;

      --typescale-label-small-size:      11px;
      --typescale-label-small-weight:    500;
      --typescale-label-small-tracking:  0.5px;
    }

    /* ── MD3 shape ── */
    :root {
      --shape-corner-none:        0px;
      --shape-corner-extra-small: 4px;
      --shape-corner-small:       8px;
      --shape-corner-medium:      12px;
      --shape-corner-large:       16px;
      --shape-corner-extra-large: 28px;
      --shape-corner-full:        9999px;
    }

    /* ── MD3 motion ── */
    :root {
      --motion-easing-standard:          cubic-bezier(0.2, 0, 0, 1);
      --motion-easing-standard-decel:    cubic-bezier(0, 0, 0, 1);
      --motion-easing-standard-accel:    cubic-bezier(0.3, 0, 1, 1);
      --motion-easing-emphasized:        cubic-bezier(0.2, 0, 0, 1);
      --motion-easing-emphasized-decel:  cubic-bezier(0.05, 0.7, 0.1, 1);
      --motion-duration-short2:  100ms;
      --motion-duration-short4:  200ms;
      --motion-duration-medium2: 300ms;
      --motion-duration-medium4: 400ms;
      --motion-duration-long2:   500ms;
    }

    /* ════════════════════════════════════════════════════════════════
       RESET
       ════════════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      font-family: 'Roboto Flex', sans-serif;
      font-size: var(--typescale-body-large-size);
      font-weight: var(--typescale-body-large-weight);
      letter-spacing: var(--typescale-body-large-tracking);
      -webkit-font-smoothing: antialiased;
    }

    /* ════════════════════════════════════════════════════════════════
       APP SHELL
       ════════════════════════════════════════════════════════════════ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 860px;
      margin: 0 auto;
      /* Subtle background pattern */
      background: var(--md-sys-color-background);
    }

    /* ════════════════════════════════════════════════════════════════
       TOP APP BAR — MD3 Small Top App Bar, Center-aligned variant
       ════════════════════════════════════════════════════════════════ */
    .top-app-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 64px;
      background: var(--surface-2);
      /* MD3 surface elevation 2 shadow + outline */
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    /* Channel hashtag pill */
    .channel-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border-radius: var(--shape-corner-full);
      font-size: var(--typescale-title-medium-size);
      font-weight: var(--typescale-title-medium-weight);
      letter-spacing: var(--typescale-title-medium-tracking);
      flex-shrink: 0;
    }

    .channel-badge .hash {
      opacity: 0.6;
      font-weight: 300;
    }

    /* Online user chips */
    .online-chips {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 2px 0;
    }
    .online-chips::-webkit-scrollbar { display: none; }

    /* MD3 Assist chip */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--md-sys-color-surface-container-low);
      color: var(--md-sys-color-on-surface-variant);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--shape-corner-small);
      font-size: var(--typescale-label-large-size);
      font-weight: var(--typescale-label-large-weight);
      letter-spacing: var(--typescale-label-large-tracking);
      white-space: nowrap;
      transition: background var(--motion-duration-short2) var(--motion-easing-standard);
    }

    /* Channel jump — MD3 outlined text field condensed */
    .channel-jump-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .channel-jump {
      width: 88px;
      height: 36px;
      padding: 0 14px;
      background: transparent;
      border: 1.5px solid var(--md-sys-color-outline);
      border-radius: var(--shape-corner-full);
      color: var(--md-sys-color-on-surface);
      font-family: inherit;
      font-size: var(--typescale-body-medium-size);
      font-weight: var(--typescale-body-medium-weight);
      letter-spacing: var(--typescale-body-medium-tracking);
      text-align: center;
      outline: none;
      transition:
        border-color var(--motion-duration-short2) var(--motion-easing-standard),
        box-shadow   var(--motion-duration-short2) var(--motion-easing-standard);
      -moz-appearance: textfield;
    }
    .channel-jump::-webkit-outer-spin-button,
    .channel-jump::-webkit-inner-spin-button { -webkit-appearance: none; }
    .channel-jump:focus {
      border-color: var(--md-sys-color-primary);
      border-width: 2px;
      box-shadow: 0 0 0 0px transparent; /* MD3 doesn't use outer glow in light */
    }
    .channel-jump::placeholder {
      color: var(--md-sys-color-on-surface-variant);
    }

    /* ════════════════════════════════════════════════════════════════
       MESSAGE LIST
       ════════════════════════════════════════════════════════════════ */
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: var(--md-sys-color-surface-container-lowest);

      /* MD3 scroll style */
      scrollbar-width: thin;
      scrollbar-color: var(--md-sys-color-outline-variant) transparent;
    }
    .message-list::-webkit-scrollbar { width: 4px; }
    .message-list::-webkit-scrollbar-track { background: transparent; }
    .message-list::-webkit-scrollbar-thumb {
      background: var(--md-sys-color-outline-variant);
      border-radius: 2px;
    }

    /* ── Day divider ── */
    .day-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0 8px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: var(--typescale-label-medium-size);
      font-weight: var(--typescale-label-medium-weight);
      letter-spacing: var(--typescale-label-medium-tracking);
    }
    .day-divider::before,
    .day-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--md-sys-color-outline-variant);
    }

    /* ════════════════════════════════════════════════════════════════
       MESSAGE ROWS & BUBBLES
       ════════════════════════════════════════════════════════════════ */
    .msg-row {
      display: flex;
      gap: 8px;
      padding: 1px 0;
      animation: msgSlideIn var(--motion-duration-short4) var(--motion-easing-standard-decel) both;
    }
    .msg-row.own   { flex-direction: row-reverse; }
    .msg-row.other { flex-direction: row; }

    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar — shown for others, first message in group */
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--shape-corner-full);
      background: var(--md-sys-color-secondary-container);
      color: var(--md-sys-color-on-secondary-container);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 2px;
      user-select: none;
    }
    .msg-row.own .msg-avatar { display: none; }
    .msg-row.other.no-avatar .msg-avatar { visibility: hidden; }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-width: min(72%, 560px);
    }
    .msg-row.own  .msg-body { align-items: flex-end; }
    .msg-row.other .msg-body { align-items: flex-start; }

    /* Sender name — only for others, first in group */
    .msg-sender {
      font-size: var(--typescale-label-medium-size);
      font-weight: var(--typescale-label-medium-weight);
      letter-spacing: var(--typescale-label-medium-tracking);
      color: var(--md-sys-color-on-surface-variant);
      padding: 0 12px;
    }
    .msg-row.own .msg-sender { display: none; }

    /* ── Bubble ── */
    .msg-bubble {
      padding: 10px 16px;
      font-size: var(--typescale-body-medium-size);
      font-weight: var(--typescale-body-medium-weight);
      letter-spacing: var(--typescale-body-medium-tracking);
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
      position: relative;
    }

    /* Own: primary-container, sharp bottom-right */
    .msg-row.own .msg-bubble {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border-radius: var(--shape-corner-large) var(--shape-corner-extra-small) var(--shape-corner-large) var(--shape-corner-large);
    }

    /* Other: surface-container, sharp bottom-left */
    .msg-row.other .msg-bubble {
      background: var(--md-sys-color-surface-container);
      color: var(--md-sys-color-on-surface);
      border-radius: var(--shape-corner-extra-small) var(--shape-corner-large) var(--shape-corner-large) var(--shape-corner-large);
    }

    /* Consecutive bubbles — round all corners more */
    .msg-row.own.consec .msg-bubble {
      border-radius: var(--shape-corner-large) var(--shape-corner-large) var(--shape-corner-extra-small) var(--shape-corner-large);
    }
    .msg-row.other.consec .msg-bubble {
      border-radius: var(--shape-corner-large) var(--shape-corner-large) var(--shape-corner-large) var(--shape-corner-extra-small);
    }

    /* Timestamp */
    .msg-time {
      font-size: var(--typescale-label-small-size);
      font-weight: var(--typescale-label-small-weight);
      letter-spacing: var(--typescale-label-small-tracking);
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.7;
      padding: 0 12px;
    }

    /* ════════════════════════════════════════════════════════════════
       BOTTOM AREA
       ════════════════════════════════════════════════════════════════ */
    .bottom-area {
      flex-shrink: 0;
      background: var(--md-sys-color-surface-container-low);
      border-top: 1px solid var(--md-sys-color-outline-variant);
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 20px 2px;
      min-height: 28px;
      transition: opacity var(--motion-duration-short2) var(--motion-easing-standard);
    }
    .typing-indicator.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--md-sys-color-primary);
      opacity: 0.5;
      animation: dotBounce 1.4s var(--motion-easing-standard) infinite;
    }
    .typing-dots span:nth-child(1) { animation-delay: 0s;     }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s;  }
    .typing-dots span:nth-child(3) { animation-delay: 0.30s;  }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1;   }
    }

    .typing-label {
      font-size: var(--typescale-label-medium-size);
      font-weight: var(--typescale-label-medium-weight);
      letter-spacing: var(--typescale-label-medium-tracking);
      color: var(--md-sys-color-on-surface-variant);
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 12px 12px;
    }

    /* MD3 Filled text field */
    .text-field-wrap {
      flex: 1;
      position: relative;
    }

    .text-field {
      display: block;
      width: 100%;
      min-height: 48px;
      padding: 12px 20px;
      background: var(--md-sys-color-surface-container-highest);
      border: none;
      border-bottom: 1.5px solid var(--md-sys-color-on-surface-variant);
      border-radius: var(--shape-corner-extra-small) var(--shape-corner-extra-small) 0 0;
      color: var(--md-sys-color-on-surface);
      font-family: inherit;
      font-size: var(--typescale-body-large-size);
      font-weight: var(--typescale-body-large-weight);
      letter-spacing: var(--typescale-body-large-tracking);
      line-height: 1.5;
      outline: none;
      transition:
        border-color  var(--motion-duration-short2) var(--motion-easing-standard),
        border-width  var(--motion-duration-short2) var(--motion-easing-standard),
        background    var(--motion-duration-short2) var(--motion-easing-standard);
      resize: none;
      max-height: 120px;
      overflow-y: auto;
    }
    .text-field::placeholder {
      color: var(--md-sys-color-on-surface-variant);
    }
    .text-field:hover {
      background: color-mix(in srgb, var(--md-sys-color-on-surface) 8%, var(--md-sys-color-surface-container-highest));
    }
    .text-field:focus {
      border-bottom-color: var(--md-sys-color-primary);
      border-bottom-width: 2px;
    }

    /* ── FAB (Send) — MD3 FAB medium, elevation 3 ── */
    .fab {
      width: 56px;
      height: 56px;
      border-radius: var(--shape-corner-large);
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;

      /* MD3 elevation level 3 */
      box-shadow:
        0px 4px 8px 3px rgba(0,0,0,0.10),
        0px 1px 3px rgba(0,0,0,0.15);

      transition:
        box-shadow var(--motion-duration-short2) var(--motion-easing-standard),
        background var(--motion-duration-short2) var(--motion-easing-standard),
        transform  var(--motion-duration-short2) var(--motion-easing-standard);
    }
    .fab:hover {
      background: color-mix(in srgb, var(--md-sys-color-on-primary-container) 8%, var(--md-sys-color-primary-container));
      box-shadow:
        0px 6px 10px 4px rgba(0,0,0,0.10),
        0px 2px 3px   rgba(0,0,0,0.15);
    }
    .fab:active {
      transform: scale(0.95);
      box-shadow:
        0px 1px 2px rgba(0,0,0,0.10),
        0px 1px 2px rgba(0,0,0,0.15);
    }
    .fab svg {
      /* shift icon slightly for optical centering */
      transform: translateX(1px);
    }

    /* ════════════════════════════════════════════════════════════════
       IDENTITY BOTTOM SHEET
       ════════════════════════════════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      /* MD3 scrim */
      backdrop-filter: blur(0px);
      animation: scrimIn var(--motion-duration-medium2) var(--motion-easing-standard) both;
    }
    .overlay.hidden { display: none; }

    @keyframes scrimIn {
      from { background: rgba(0,0,0,0); }
      to   { background: rgba(0,0,0,0.4); }
    }

    /* MD3 Bottom Sheet */
    .bottom-sheet {
      width: 100%;
      max-width: 640px;
      background: var(--md-sys-color-surface-container-low);
      border-radius: var(--shape-corner-extra-large) var(--shape-corner-extra-large) 0 0;
      padding: 16px 24px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: sheetUp var(--motion-duration-medium4) var(--motion-easing-emphasized-decel) both;
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle {
      width: 32px;
      height: 4px;
      background: var(--md-sys-color-on-surface-variant);
      border-radius: 2px;
      align-self: center;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .sheet-header { display: flex; flex-direction: column; gap: 4px; }

    .sheet-title {
      font-size: var(--typescale-headline-small-size);
      font-weight: var(--typescale-headline-small-weight);
      letter-spacing: var(--typescale-headline-small-tracking);
      color: var(--md-sys-color-on-surface);
    }
    .sheet-subtitle {
      font-size: var(--typescale-body-medium-size);
      font-weight: var(--typescale-body-medium-weight);
      letter-spacing: var(--typescale-body-medium-tracking);
      color: var(--md-sys-color-on-surface-variant);
    }

    /* MD3 Outlined text field for name */
    .name-field-wrap {
      position: relative;
    }
    .name-field-label {
      position: absolute;
      top: -9px;
      left: 12px;
      padding: 0 4px;
      background: var(--md-sys-color-surface-container-low);
      font-size: var(--typescale-label-small-size);
      font-weight: var(--typescale-label-small-weight);
      letter-spacing: var(--typescale-label-small-tracking);
      color: var(--md-sys-color-primary);
      pointer-events: none;
    }
    .name-field {
      width: 100%;
      height: 56px;
      padding: 16px;
      background: transparent;
      border: 1.5px solid var(--md-sys-color-outline);
      border-radius: var(--shape-corner-extra-small);
      color: var(--md-sys-color-on-surface);
      font-family: inherit;
      font-size: var(--typescale-body-large-size);
      font-weight: var(--typescale-body-large-weight);
      letter-spacing: var(--typescale-body-large-tracking);
      outline: none;
      transition: border-color var(--motion-duration-short2) var(--motion-easing-standard);
    }
    .name-field::placeholder { color: var(--md-sys-color-on-surface-variant); }
    .name-field:focus {
      border-color: var(--md-sys-color-primary);
      border-width: 2px;
    }

    /* Emoji section */
    .emoji-section { display: flex; flex-direction: column; gap: 10px; }
    .emoji-section-label {
      font-size: var(--typescale-label-large-size);
      font-weight: var(--typescale-label-large-weight);
      letter-spacing: var(--typescale-label-large-tracking);
      color: var(--md-sys-color-on-surface-variant);
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }

    .emoji-btn {
      aspect-ratio: 1;
      border: 1.5px solid transparent;
      border-radius: var(--shape-corner-small);
      background: var(--md-sys-color-surface-container);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        background     var(--motion-duration-short2) var(--motion-easing-standard),
        border-color   var(--motion-duration-short2) var(--motion-easing-standard),
        transform      var(--motion-duration-short2) var(--motion-easing-standard);
      line-height: 1;
      user-select: none;
    }
    .emoji-btn:hover {
      background: var(--md-sys-color-surface-container-high);
      border-color: var(--md-sys-color-outline-variant);
    }
    .emoji-btn:active { transform: scale(0.9); }
    .emoji-btn.selected {
      border-color: var(--md-sys-color-primary);
      background: var(--md-sys-color-primary-container);
    }

    /* MD3 Filled button */
    .btn-filled {
      height: 40px;
      padding: 0 24px;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      border-radius: var(--shape-corner-full);
      font-family: inherit;
      font-size: var(--typescale-label-large-size);
      font-weight: var(--typescale-label-large-weight);
      letter-spacing: var(--typescale-label-large-tracking);
      cursor: pointer;
      align-self: flex-end;
      transition:
        background  var(--motion-duration-short2) var(--motion-easing-standard),
        box-shadow  var(--motion-duration-short2) var(--motion-easing-standard);
    }
    .btn-filled:hover {
      background: color-mix(in srgb, var(--md-sys-color-on-primary) 8%, var(--md-sys-color-primary));
      box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
    }
    .btn-filled:active {
      background: color-mix(in srgb, var(--md-sys-color-on-primary) 12%, var(--md-sys-color-primary));
      box-shadow: none;
    }

    /* ════════════════════════════════════════════════════════════════
       SNACKBAR — MD3 spec
       ════════════════════════════════════════════════════════════════ */
    .snackbar-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      align-items: center;
      z-index: 200;
      pointer-events: none;
    }

    .snackbar {
      background: var(--md-sys-color-inverse-surface);
      color: var(--md-sys-color-inverse-on-surface);
      padding: 14px 16px;
      border-radius: var(--shape-corner-extra-small);
      font-size: var(--typescale-body-medium-size);
      font-weight: var(--typescale-body-medium-weight);
      letter-spacing: var(--typescale-body-medium-tracking);
      min-width: 200px;
      max-width: 480px;
      text-align: center;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(6px) scale(0.98);
      transition:
        opacity   var(--motion-duration-short4) var(--motion-easing-standard-decel),
        transform var(--motion-duration-short4) var(--motion-easing-standard-decel);
      /* MD3 elevation 3 */
      box-shadow: 0px 4px 8px 3px rgba(0,0,0,0.12), 0px 1px 3px rgba(0,0,0,0.20);
    }
    .snackbar.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Top App Bar ── -->
  <header class="top-app-bar">
    <div id="channel-title" class="channel-badge">
      <span class="hash">#</span>
      <span id="channel-num">–</span>
    </div>
    <div id="online-chips" class="online-chips"></div>
    <input
      id="channel-jump"
      class="channel-jump"
      type="number"
      min="1"
      max="256"
      placeholder="go to #"
      title="Jump to channel (1–256), press Enter"
    />
  </header>

  <!-- ── Message list ── -->
  <main
    id="messages"
    class="message-list"
    role="log"
    aria-live="polite"
    aria-label="Messages"
  ></main>

  <!-- ── Bottom area ── -->
  <div class="bottom-area">
    <div id="typing-indicator" class="typing-indicator hidden">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span id="typing-label" class="typing-label"></span>
    </div>
    <div class="input-row">
      <div class="text-field-wrap">
        <input
          id="msg-input"
          type="text"
          class="text-field"
          placeholder="Message…"
          autocomplete="off"
          maxlength="2000"
        />
      </div>
      <button id="send-btn" class="fab" aria-label="Send message">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Identity bottom sheet ── -->
<div id="identity-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheet-title" class="sheet-title">Who are you?</h2>
      <p class="sheet-subtitle">Pick a name and an emoji — stored only in your browser.</p>
    </div>
    <div class="name-field-wrap">
      <span class="name-field-label">Name</span>
      <input
        id="name-input"
        type="text"
        class="name-field"
        placeholder="Your name"
        maxlength="30"
        autocomplete="off"
      />
    </div>
    <div class="emoji-section">
      <span class="emoji-section-label">Choose your emoji</span>
      <div id="emoji-grid" class="emoji-grid"></div>
    </div>
    <button id="enter-btn" class="btn-filled">Enter chat</button>
  </div>
</div>

<!-- ── Snackbar container ── -->
<div
  id="snackbar-container"
  class="snackbar-container"
  aria-live="assertive"
  aria-atomic="false"
></div>

<script>
'use strict';

/* ── Config ─────────────────────────────────────────────────── */
const EMOJIS = [
  '🌿','🔥','⚡','🌊','🎯','🦋','🌺','🎸','🚀','🌙',
  '🦊','🐉','🌈','💎','🎭','🦉','🌻','🍀','⭐','🎪',
];

/* ── Parse & validate channel ───────────────────────────────── */
const pathParts = location.pathname.split('/');
const channel   = parseInt(pathParts[2], 10);
if (!channel || channel < 1 || channel > 256) {
  location.replace('/');
}

/* ── DOM refs ───────────────────────────────────────────────── */
const $channelNum  = document.getElementById('channel-num');
const $chips       = document.getElementById('online-chips');
const $jump        = document.getElementById('channel-jump');
const $messages    = document.getElementById('messages');
const $typing      = document.getElementById('typing-indicator');
const $typingLbl   = document.getElementById('typing-label');
const $input       = document.getElementById('msg-input');
const $send        = document.getElementById('send-btn');
const $overlay     = document.getElementById('identity-overlay');
const $name        = document.getElementById('name-input');
const $emojiGrid   = document.getElementById('emoji-grid');
const $enter       = document.getElementById('enter-btn');
const $snacks      = document.getElementById('snackbar-container');

/* ── State ──────────────────────────────────────────────────── */
let myName         = localStorage.getItem('chat_name')  || '';
let myEmoji        = localStorage.getItem('chat_emoji') || '';
let selectedEmoji  = EMOJIS[0];
let ws             = null;
let isTyping       = false;
let typingTimer    = null;
const typingUsers  = new Map(); // name → timerID

/* ── Boot ───────────────────────────────────────────────────── */
$channelNum.textContent = channel;
$input.placeholder = `Message # ${channel}…`;
buildEmojiGrid();

if (myName && myEmoji) {
  connectWS();
} else {
  $overlay.classList.remove('hidden');
  $name.focus();
}

/* ── WebSocket lifecycle ────────────────────────────────────── */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${channel}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', name: myName, emoji: myEmoji }));
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }
    dispatch(msg);
  };

  ws.onclose = () => {
    showSnackbar('Connection lost — reconnecting in 3s…');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

/* ── Dispatcher ─────────────────────────────────────────────── */
function dispatch(msg) {
  switch (msg.type) {
    case 'history':
      $messages.innerHTML = '';
      (msg.msgs || []).forEach(m => renderMsg(m.name, m.emoji, m.text, m.ts, false));
      scrollBottom(false);
      break;
    case 'msg':
      renderMsg(msg.name, msg.emoji, msg.text, msg.ts, true);
      if (nearBottom()) scrollBottom(true);
      break;
    case 'join':
      showSnackbar(`${msg.emoji} ${msg.name} joined`);
      break;
    case 'leave':
      showSnackbar(`${msg.emoji} ${msg.name} left`);
      break;
    case 'online':
      renderChips(msg.users || []);
      break;
    case 'typing':
      onTypingEvent(msg.name, msg.active);
      break;
  }
}

/* ── Render bubble ──────────────────────────────────────────── */
let lastSender = null;

function renderMsg(name, emoji, text, ts, animate) {
  const own = name === myName && emoji === myEmoji;
  const consec = lastSender === (own ? '__me__' : name);
  lastSender = own ? '__me__' : name;

  const row = document.createElement('div');
  row.className = `msg-row ${own ? 'own' : 'other'}${consec ? ' consec' : ''}${consec ? ' no-avatar' : ''}`;
  if (!animate) row.style.animation = 'none';

  // Avatar (other only)
  if (!own) {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = emoji;
    av.setAttribute('aria-hidden', 'true');
    row.appendChild(av);
  }

  const body = document.createElement('div');
  body.className = 'msg-body';

  // Sender name (other, first in group only)
  if (!own && !consec) {
    const sender = document.createElement('div');
    sender.className = 'msg-sender';
    sender.textContent = name;
    body.appendChild(sender);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  body.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = fmtTime(ts);
  body.appendChild(time);

  row.appendChild(body);
  $messages.appendChild(row);
}

/* ── Online chips ───────────────────────────────────────────── */
function renderChips(users) {
  $chips.innerHTML = '';
  users.forEach(({ name, emoji }) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = `${emoji} ${name}`;
    $chips.appendChild(chip);
  });
}

/* ── Typing ─────────────────────────────────────────────────── */
function onTypingEvent(name, active) {
  if (name === myName) return;
  if (active) {
    if (typingUsers.has(name)) clearTimeout(typingUsers.get(name));
    typingUsers.set(name, setTimeout(() => {
      typingUsers.delete(name);
      refreshTyping();
    }, 3000));
  } else {
    if (typingUsers.has(name)) {
      clearTimeout(typingUsers.get(name));
      typingUsers.delete(name);
    }
  }
  refreshTyping();
}

function refreshTyping() {
  if (typingUsers.size === 0) {
    $typing.classList.add('hidden');
    return;
  }
  const names = [...typingUsers.keys()].join(', ');
  $typingLbl.textContent = `${names} ${typingUsers.size === 1 ? 'is' : 'are'} typing…`;
  $typing.classList.remove('hidden');
}

/* ── Send ───────────────────────────────────────────────────── */
$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

$input.addEventListener('input', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (!isTyping) {
    isTyping = true;
    ws.send(JSON.stringify({ type: 'typing', active: true }));
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    isTyping = false;
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'typing', active: false }));
  }, 2000);
});

$send.addEventListener('click', sendMsg);

function sendMsg() {
  const text = $input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'msg', text }));
  $input.value = '';
  clearTimeout(typingTimer);
  if (isTyping) {
    isTyping = false;
    ws.send(JSON.stringify({ type: 'typing', active: false }));
  }
}

/* ── Channel jump ───────────────────────────────────────────── */
$jump.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const n = parseInt($jump.value, 10);
  if (n >= 1 && n <= 256) location.href = `/ch/${n}`;
  else $jump.value = '';
});

/* ── Identity sheet ─────────────────────────────────────────── */
function buildEmojiGrid() {
  EMOJIS.forEach((emoji, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'emoji-btn' + (i === 0 ? ' selected' : '');
    btn.textContent = emoji;
    btn.setAttribute('aria-label', emoji);
    btn.addEventListener('click', () => {
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedEmoji = emoji;
    });
    $emojiGrid.appendChild(btn);
  });
  selectedEmoji = EMOJIS[0];
}

$enter.addEventListener('click', submitIdentity);
$name.addEventListener('keydown', e => { if (e.key === 'Enter') submitIdentity(); });

function submitIdentity() {
  const name = $name.value.trim();
  if (!name) { $name.focus(); return; }
  myName  = name;
  myEmoji = selectedEmoji;
  localStorage.setItem('chat_name',  myName);
  localStorage.setItem('chat_emoji', myEmoji);
  $overlay.classList.add('hidden');
  connectWS();
}

/* ── Snackbar ───────────────────────────────────────────────── */
function showSnackbar(text) {
  const el = document.createElement('div');
  el.className = 'snackbar';
  el.textContent = text;
  $snacks.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
  setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

/* ── Utils ──────────────────────────────────────────────────── */
function scrollBottom(smooth) {
  $messages.scrollTo({ top: $messages.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}
function nearBottom() {
  return $messages.scrollHeight - $messages.scrollTop - $messages.clientHeight < 120;
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
</script>
</body>
</html>
